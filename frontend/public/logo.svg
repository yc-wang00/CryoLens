<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="arc-outer" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f6073"/>
      <stop offset="100%" stop-color="#3d4d5e"/>
    </linearGradient>
    <linearGradient id="arc-mid" x1="0" y1="8" x2="36" y2="36" gradientUnits="userSpaceOnUse">
